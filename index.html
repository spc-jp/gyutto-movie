<!DOCTYPE html>
<html lang="ja">
<head>
    <!-- 文字化けを防ぐための設定 -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ギュッと！ムービー</title>
    
    <!-- Tailwind CSS (デザイン用) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React と Babel (アプリを動かすための仕組み) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef } = React;

        // --- アイコンコンポーネント（Lucideアイコンの代わり） ---
        const Icon = ({ children, size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {children}
            </svg>
        );
        const Upload = (props) => <Icon {...props}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></Icon>;
        const Video = (props) => <Icon {...props}><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></Icon>;
        const Scissors = (props) => <Icon {...props}><circle cx="6" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><line x1="20" y1="4" x2="8.12" y2="15.88"/><line x1="14.47" y1="14.48" x2="20" y2="20"/><line x1="8.12" y1="8.12" x2="12" y2="12"/></Icon>;
        const Music = (props) => <Icon {...props}><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></Icon>;
        const CheckCircle2 = (props) => <Icon {...props}><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></Icon>;
        const Loader2 = (props) => <Icon {...props}><path d="M21 12a9 9 0 1 1-6.219-8.56"/></Icon>;
        const Play = (props) => <Icon {...props}><polygon points="5 3 19 12 5 21 5 3"/></Icon>;
        // --------------------------------------------------------

        function App() {
            const [step, setStep] = useState(1);
            const [videoFile, setVideoFile] = useState(null);
            const [videoUrl, setVideoUrl] = useState('');
            const [duration, setDuration] = useState(15);
            const [isProcessing, setIsProcessing] = useState(false);
            const [isDone, setIsDone] = useState(false);
            
            const videoRef = useRef(null);

            // 動画ファイル選択時の処理
            const handleVideoUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    setVideoFile(file);
                    setVideoUrl(URL.createObjectURL(file));
                    setStep(2); // 次のステップへ
                }
            };

            // 生成ボタンを押した時の処理（今回はモックなのでダミーの待機時間）
            const handleGenerate = () => {
                setIsProcessing(true);
                // 3秒後に完了したことにする
                setTimeout(() => {
                    setIsProcessing(false);
                    setIsDone(true);
                    setStep(3);
                }, 3000);
            };

            // 最初からやり直す
            const handleReset = () => {
                setStep(1);
                setVideoFile(null);
                setVideoUrl('');
                setIsDone(false);
            };

            return (
                <div className="min-h-screen bg-gray-50 flex items-center justify-center p-4 font-sans">
                    {/* スマホ画面を模したコンテナ */}
                    <div className="w-full max-w-sm bg-white rounded-[2rem] shadow-2xl overflow-hidden border-8 border-gray-900 relative h-[800px] flex flex-col">
                        
                        {/* ヘッダー */}
                        <div className="bg-gradient-to-r from-purple-600 to-pink-500 text-white p-4 text-center">
                            <h1 className="text-xl font-bold tracking-wider">ギュッと！ムービー</h1>
                            <p className="text-xs opacity-80">1タップで日常をバズらせよう</p>
                        </div>

                        {/* メインコンテンツエリア */}
                        <div className="flex-1 overflow-y-auto p-6 flex flex-col">
                            
                            {/* STEP 1: 動画の選択 */}
                            {step === 1 && (
                                <div className="flex-1 flex flex-col items-center justify-center space-y-6">
                                    <div className="w-32 h-32 bg-purple-100 rounded-full flex items-center justify-center mb-4">
                                        <Video size={48} className="text-purple-600" />
                                    </div>
                                    <h2 className="text-xl font-bold text-gray-800 text-center">動画を選んでください</h2>
                                    <p className="text-sm text-gray-500 text-center">長回しした動画でOK！<br/>一番いいところを自動で抽出します。</p>
                                    
                                    <label className="mt-8 w-full bg-purple-600 hover:bg-purple-700 text-white rounded-full py-4 px-6 flex items-center justify-center cursor-pointer transition-colors shadow-lg">
                                        <Upload size={20} className="mr-2" />
                                        <span className="font-bold">カメラロールから選択</span>
                                        <input 
                                            type="file" 
                                            accept="video/mp4,video/x-m4v,video/*" 
                                            className="hidden" 
                                            onChange={handleVideoUpload}
                                        />
                                    </label>
                                </div>
                            )}

                            {/* STEP 2: 設定と生成 */}
                            {step === 2 && (
                                <div className="flex-1 flex flex-col space-y-6">
                                    {/* 動画プレビュー */}
                                    <div className="relative w-full aspect-[9/16] bg-black rounded-xl overflow-hidden shadow-inner">
                                        {videoUrl && (
                                            <video 
                                                ref={videoRef}
                                                src={videoUrl} 
                                                className="w-full h-full object-cover"
                                                controls
                                            />
                                        )}
                                    </div>

                                    {/* 設定パネル */}
                                    <div className="bg-gray-100 rounded-xl p-4 space-y-4">
                                        <div>
                                            <p className="text-sm font-bold text-gray-700 mb-2 flex items-center">
                                                <Scissors size={16} className="mr-1"/> 長さを選ぶ
                                            </p>
                                            <div className="flex space-x-2">
                                                <button 
                                                    onClick={() => setDuration(15)}
                                                    className={`flex-1 py-2 rounded-lg font-bold transition-colors ${duration === 15 ? 'bg-purple-600 text-white shadow-md' : 'bg-white text-gray-600 border border-gray-200'}`}
                                                >
                                                    15秒
                                                </button>
                                                <button 
                                                    onClick={() => setDuration(30)}
                                                    className={`flex-1 py-2 rounded-lg font-bold transition-colors ${duration === 30 ? 'bg-purple-600 text-white shadow-md' : 'bg-white text-gray-600 border border-gray-200'}`}
                                                >
                                                    30秒
                                                </button>
                                            </div>
                                        </div>

                                        <div className="space-y-2">
                                            <p className="text-sm font-bold text-gray-700 flex items-center">
                                                <Music size={16} className="mr-1"/> おまかせ編集（準備中）
                                            </p>
                                            <div className="flex items-center text-sm text-gray-500 bg-white p-2 rounded-lg border border-gray-200 opacity-60">
                                                <CheckCircle2 size={16} className="mr-2 text-green-500" /> AIハイライト抽出
                                            </div>
                                            <div className="flex items-center text-sm text-gray-500 bg-white p-2 rounded-lg border border-gray-200 opacity-60">
                                                <CheckCircle2 size={16} className="mr-2 text-green-500" /> BGMビートシンク
                                            </div>
                                        </div>
                                    </div>

                                    {/* 生成ボタン */}
                                    <button 
                                        onClick={handleGenerate}
                                        disabled={isProcessing}
                                        className="w-full bg-gradient-to-r from-purple-600 to-pink-500 hover:from-purple-700 hover:to-pink-600 text-white rounded-full py-4 font-bold text-lg flex items-center justify-center shadow-lg transition-all transform hover:scale-[1.02] disabled:opacity-70 disabled:hover:scale-100"
                                    >
                                        {isProcessing ? (
                                            <>
                                                <Loader2 size={24} className="mr-2 animate-spin" />
                                                AIが編集中...
                                            </>
                                        ) : (
                                            <>
                                                <Play size={24} className="mr-2 fill-current" />
                                                魔法のショート動画を作る
                                            </>
                                        )}
                                    </button>
                                </div>
                            )}

                            {/* STEP 3: 完成画面 */}
                            {step === 3 && (
                                <div className="flex-1 flex flex-col items-center justify-center space-y-6">
                                    <div className="w-24 h-24 bg-green-100 rounded-full flex items-center justify-center mb-2">
                                        <CheckCircle2 size={48} className="text-green-500" />
                                    </div>
                                    <h2 className="text-2xl font-bold text-gray-800">完成しました！</h2>
                                    <p className="text-gray-600 text-center">
                                        あなたの日常が<br/><span className="font-bold text-purple-600">{duration}秒</span>の素敵な動画になりました。
                                    </p>

                                    <div className="w-full space-y-3 mt-8">
                                        <button className="w-full bg-black text-white rounded-full py-3 font-bold flex items-center justify-center">
                                            📱 デバイスに保存
                                        </button>
                                        <button className="w-full bg-[#FE2C55] text-white rounded-full py-3 font-bold flex items-center justify-center">
                                            🎵 TikTokでシェア
                                        </button>
                                        <button className="w-full bg-gradient-to-tr from-yellow-400 via-red-500 to-purple-500 text-white rounded-full py-3 font-bold flex items-center justify-center">
                                            📸 Instagramでシェア
                                        </button>
                                        
                                        <button 
                                            onClick={handleReset}
                                            className="w-full mt-4 text-gray-500 font-bold py-2"
                                        >
                                            最初からやり直す
                                        </button>
                                    </div>
                                </div>
                            )}
                            
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
